<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            height: 200px;
            width: 200px;
            background-color: pink;
        }
        .card:hover{
            height: 250px;
            width: 250px;
            background-color: lightblue;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Card Title</h2>
        <p>This is a card description. It provides some information about the content of the card.</p>
    </div>
</body>
</html>
