<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Grid - CSS Grid & Media Queries</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Responsive Image Gallery</h1>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Mountain landscape">
                <p>Mountain Landscape</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=400&h=300&fit=crop" alt="Ocean waves">
                <p>Ocean Waves</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Forest trees">
                <p>Forest Trees</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=400&h=300&fit=crop" alt="Desert sunset">
                <p>Desert Sunset</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Snow peaks">
                <p>Snow Peaks</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=400&h=300&fit=crop" alt="Starry night">
                <p>Starry Night</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="River flow">
                <p>River Flow</p>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=400&h=300&fit=crop" alt="City lights">
                <p>City Lights</p>
            </div>
        </div>
    </div>
</body>
</html>
