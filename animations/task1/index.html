<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #animate{
            width: 100px;
            height: 50px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        #animate:hover{
            background-color:green;
            transition:all 0.5s ease;
        }
    </style>
</head>
<body>
    <button id="animate">Animate</button>
</body>
</html>
